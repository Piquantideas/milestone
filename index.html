<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Mobile optimisation -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Marketing Animation</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #stage {
      width: 100vw;
      max-width: 420px;
      margin: 0 auto;
      aspect-ratio: 9 / 16;
      background: #000;
      position: relative;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #text-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
      flex-direction: column;
      gap: 10px;
    }

    .txt {
      color: #f0ece4;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(13px, 3vw, 20px);
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.9s ease;
      line-height: 1.55;
      max-width: 80%;
      font-style: italic;
    }

    .txt.sub {
      font-size: clamp(8px, 1.7vw, 12px);
      letter-spacing: 0.22em;
      color: rgba(240, 236, 228, 0.55);
      font-style: normal;
      font-weight: 300;
      font-family: 'Playfair Display', serif;
    }

    .txt.visible {
      opacity: 1;
    }

    #timer-bar {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    #timer-fill {
      height: 100%;
      background: rgba(255, 255, 255, 0.25);
      width: 0%;
    }

    #play-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.6);
      z-index: 10;
      flex-direction: column;
      gap: 12px;
    }

    #play-btn svg {
      opacity: 0.7;
    }

    #play-label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      letter-spacing: 0.25em;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    /* Extra mobile responsiveness */
    @media (max-width: 768px) {
      .txt {
        font-size: clamp(14px, 4vw, 20px);
        max-width: 85%;
      }

      .txt.sub {
        font-size: clamp(9px, 2vw, 12px);
      }

      #timer-bar {
        width: 70%;
        bottom: 14px;
      }
    }
  </style>
</head>

<body>

  <!-- Keep your existing HTML content here -->
  <!-- Your #stage div, canvas, text layers, and script remain unchanged -->

</body>
</html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
