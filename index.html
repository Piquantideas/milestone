
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000}
  #stage{
    width:100%;
    max-width:420px;
    margin:0 auto;
    aspect-ratio:9/16;
    background:#000;
    position:relative;
    overflow:hidden;
    font-family:'Playfair Display',serif;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%}
  #text-layer{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    text-align:center;pointer-events:none;
    flex-direction:column;gap:10px;
  }
  .txt{
    color:#f0ece4;
    font-family:'Playfair Display',serif;
    font-weight:400;
    font-size:clamp(13px,3vw,20px);
    letter-spacing:0.06em;
    opacity:0;
    transition:opacity 0.9s ease;
    line-height:1.55;
    max-width:80%;
    font-style:italic;
  }
  .txt.sub{
    font-size:clamp(8px,1.7vw,12px);
    letter-spacing:0.22em;
    color:rgba(240,236,228,0.55);
    font-style:normal;
    font-weight:300;
    font-family:'Playfair Display',serif;
  }
  .txt.visible{opacity:1}
  #timer-bar{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    width:60%;height:1px;background:rgba(255,255,255,0.08);
  }
  #timer-fill{height:100%;background:rgba(255,255,255,0.25);width:0%}
  #play-btn{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    cursor:pointer;background:rgba(0,0,0,0.6);z-index:10;
    flex-direction:column;gap:12px;
  }
  #play-btn svg{opacity:0.7}
  #play-label{color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:0.25em;font-family:'Playfair Display',serif;font-style:italic}
</style>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="text-layer">
    <div class="txt" id="t1">Marketing used to be linear.</div>
    <div class="txt sub" id="t2">Awareness &nbsp;→&nbsp; Consideration &nbsp;→&nbsp; Conversion</div>
    <div class="txt" id="t3">That world is gone.</div>
    <div class="txt" id="t4">Today…</div>
    <div class="txt" id="t5">Attention doesn't follow a path.</div>
  </div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div id="play-btn">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="21" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/><polygon points="17,14 34,22 17,30" fill="rgba(255,255,255,0.7)"/></svg>
    <div id="play-label">Play</div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const stage=document.getElementById('stage');
const texts={t1:document.getElementById('t1'),t2:document.getElementById('t2'),t3:document.getElementById('t3'),t4:document.getElementById('t4'),t5:document.getElementById('t5')};
const timerFill=document.getElementById('timer-fill');
const playBtn=document.getElementById('play-btn');

// 1.5x speed: 25s → ~16.67s
const DURATION=Math.round(25000/1.5);

let W,H,cx,cy,particles=[],funnelPts=[],animId,startTime,playing=false;

function resize(){
  const r=stage.getBoundingClientRect();
  W=canvas.width=r.width*devicePixelRatio;
  H=canvas.height=r.height*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  W/=devicePixelRatio;H/=devicePixelRatio;
  cx=W/2;cy=H/2;
  buildFunnel();
  initParticles();
}

function buildFunnel(){
  funnelPts=[];
  const topW=W*0.38,botW=W*0.07;
  const topY=cy-H*0.22,botY=cy+H*0.22;
  const steps=28;
  for(let i=0;i<=steps;i++){
    const pct=i/steps;
    const hw=topW/2+(botW/2-topW/2)*pct;
    const y=topY+(botY-topY)*pct;
    funnelPts.push({pct,hw,y,left:cx-hw,right:cx+hw});
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<180;i++){
    const side=Math.random()<0.5?-1:1;
    const pct=Math.random();
    const row=funnelPts[Math.floor(pct*(funnelPts.length-1))];
    const baseX=side>0?row.right:row.left;
    const baseY=row.y;
    particles.push({
      x:baseX,y:baseY,ox:baseX,oy:baseY,
      alpha:Math.random()*0.6+0.2,
      size:Math.random()*1.2+0.3,
      driftX:(Math.random()-0.5)*90,
      driftY:(Math.random()-0.5)*70,
      phase:Math.random()*Math.PI*2,
      side,pct
    });
  }
}

function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function lerp(a,b,t){return a+(b-a)*t}

function drawFunnel(glitch,fragPct,alpha){
  if(alpha<=0)return;
  ctx.save();
  ctx.globalAlpha=alpha;
  const lineCount=funnelPts.length-1;
  for(let i=0;i<lineCount;i++){
    const a=funnelPts[i],b=funnelPts[i+1];
    const segAlpha=1-Math.pow(i/lineCount,1.5)*fragPct;
    if(segAlpha<=0)continue;
    const gx=glitch>0?(Math.random()-0.5)*glitch*12:0;
    const gy=glitch>0?(Math.random()-0.5)*glitch*4:0;
    ctx.beginPath();
    ctx.moveTo(a.left+gx,a.y+gy);ctx.lineTo(b.left+gx,b.y+gy);
    ctx.moveTo(a.right+gx,a.y+gy);ctx.lineTo(b.right+gx,b.y+gy);
    const brightness=0.55+0.3*(1-i/lineCount);
    const grad=ctx.createLinearGradient(0,a.y,0,b.y);
    grad.addColorStop(0,`rgba(${Math.round(brightness*255)},${Math.round(brightness*255)},${Math.round(brightness*255)},${segAlpha})`);
    grad.addColorStop(1,`rgba(${Math.round(brightness*255)},${Math.round(brightness*255)},${Math.round(brightness*255)},${segAlpha*0.6})`);
    ctx.strokeStyle=grad;ctx.lineWidth=0.5;ctx.stroke();
  }
  for(let i=0;i<funnelPts.length;i+=4){
    const row=funnelPts[i];
    const segAlpha=(1-Math.pow(i/(funnelPts.length),1.3)*fragPct)*0.25;
    if(segAlpha<=0)continue;
    const gx=glitch>0?(Math.random()-0.5)*glitch*8:0;
    ctx.beginPath();
    ctx.moveTo(row.left+gx,row.y);ctx.lineTo(row.right+gx,row.y);
    ctx.strokeStyle=`rgba(200,200,200,${segAlpha})`;
    ctx.lineWidth=0.4;ctx.stroke();
  }
  ctx.restore();
}

function drawGlow(fragPct,phase,elapsed){
  const r=H*0.38;
  const gAlpha=Math.max(0,fragPct-0.3)*1.0;
  if(gAlpha>0){
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.9);
    g.addColorStop(0,`rgba(160,150,200,${gAlpha*0.08})`);
    g.addColorStop(0.5,`rgba(120,110,180,${gAlpha*0.04})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,cy,r*0.9,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  }
  // pulse glow during scaled 0:05–0:08 window
  const s5=Math.round(5000/1.5),s8=Math.round(8500/1.5);
  if(elapsed>s5&&elapsed<s8){
    const pulse=Math.sin((elapsed-s5)/(s8-s5)*Math.PI)*0.5;
    const g2=ctx.createRadialGradient(cx,cy-H*0.04,0,cx,cy-H*0.04,W*0.3);
    g2.addColorStop(0,`rgba(255,255,255,${pulse*0.06})`);
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(cx,cy-H*0.04,W*0.3,0,Math.PI*2);
    ctx.fillStyle=g2;ctx.fill();
  }
}

function drawParticles(fragPct,elapsed){
  for(const p of particles){
    const drift=Math.min(1,Math.max(0,(fragPct-0.1)/0.7));
    const tx=p.ox+p.driftX*drift;
    const ty=p.oy+p.driftY*drift;
    p.x=lerp(p.ox,tx,easeInOut(Math.min(1,drift*1.5)));
    p.y=lerp(p.oy,ty,easeInOut(Math.min(1,drift*1.5)));
    p.y+=Math.sin(elapsed*0.0006+p.phase)*2*drift;
    const a=p.alpha*(0.2+0.8*Math.min(1,fragPct*2));
    const glowR=p.size*3.5;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,glowR);
    g.addColorStop(0,`rgba(220,218,210,${a})`);
    g.addColorStop(1,'rgba(220,218,210,0)');
    ctx.beginPath();ctx.arc(p.x,p.y,glowR,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*0.4,0,Math.PI*2);
    ctx.fillStyle=`rgba(240,238,230,${a})`;ctx.fill();
  }
}

function setTextVisibility(id){
  Object.values(texts).forEach(el=>el.classList.remove('visible'));
  if(id&&texts[id])texts[id].classList.add('visible');
}

// Scale all original timestamps by /1.5
const T=ms=>Math.round(ms/1.5);

function animate(ts){
  if(!startTime)startTime=ts;
  const elapsed=ts-startTime;
  const phase=Math.min(1,elapsed/DURATION);
  timerFill.style.width=(phase*100)+'%';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  let glitch=0,fragPct=0,funnelAlpha=1;

  if(elapsed<T(4000)){
    glitch=0;fragPct=0;
    funnelAlpha=Math.min(1,elapsed/T(800));
    setTextVisibility('t1');
  } else if(elapsed<T(8500)){
    glitch=0;fragPct=0;funnelAlpha=1;
    setTextVisibility('t2');
  } else if(elapsed<T(12000)){
    const p2=(elapsed-T(8500))/(T(12000)-T(8500));
    glitch=easeInOut(p2)*0.6;
    fragPct=easeInOut(p2)*0.2;
    funnelAlpha=1;
    setTextVisibility(null);
  } else if(elapsed<T(15500)){
    const p3=(elapsed-T(12000))/(T(15500)-T(12000));
    glitch=0.6+p3*0.4;
    fragPct=0.2+p3*0.7;
    funnelAlpha=1-p3*0.6;
    setTextVisibility('t3');
  } else if(elapsed<T(20000)){
    const p4=(elapsed-T(15500))/(T(20000)-T(15500));
    glitch=Math.max(0,0.4-p4*0.8);
    fragPct=0.9+p4*0.1;
    funnelAlpha=Math.max(0,0.4-p4*0.4);
    setTextVisibility('t4');
  } else {
    fragPct=1;funnelAlpha=0;glitch=0;
    setTextVisibility('t5');
  }

  drawGlow(fragPct,phase,elapsed);
  drawFunnel(glitch,fragPct,funnelAlpha);
  drawParticles(fragPct,elapsed);

  if(glitch>0.1&&Math.random()<glitch*0.35){
    const sy=Math.random()*H;
    const sh=Math.random()*3+1;
    const shift=(Math.random()-0.5)*glitch*18;
    ctx.save();
    ctx.globalAlpha=glitch*0.15;
    const imgData=ctx.getImageData(0,sy,W,sh);
    ctx.putImageData(imgData,shift,sy);
    ctx.restore();
  }

  if(elapsed<DURATION){
    animId=requestAnimationFrame(animate);
  } else {
    setTextVisibility('t5');
    timerFill.style.width='100%';
    setTimeout(()=>{playBtn.style.display='flex';playing=false;},600);
  }
}

function startAnim(){
  if(playing)return;
  playing=true;
  startTime=null;
  timerFill.style.width='0%';
  Object.values(texts).forEach(el=>el.classList.remove('visible'));
  cancelAnimationFrame(animId);
  initParticles();
  animId=requestAnimationFrame(animate);
}

playBtn.addEventListener('click',()=>{playBtn.style.display='none';startAnim();});
new ResizeObserver(resize).observe(stage);
resize();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
