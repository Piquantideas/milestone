<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Are You Keeping Up?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overscroll-behavior: none;
      overflow: hidden;
      /* ✅ Safe-area padding for notched phones (iPhone X+) */
      padding: env(safe-area-inset-top,0px) env(safe-area-inset-right,0px)
               env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
    }

    #stage {
      /*
       * ✅ FIX 1 — 3-arg min() not supported on older Android WebView.
       *    Chain two min() calls instead, which has universal support.
       *    Result: stage is never wider than 420px, never wider than 100vw,
       *    and on portrait mobile it tracks viewport height so it fills the screen.
       * ✅ FIX 2 — Use 100dvh (dynamic viewport height) so the stage isn't
       *    clipped by iOS Safari's collapsible toolbar. Falls back to 100vh.
       */
      --stage-w: min(420px, min(100vw, calc(100dvh * 9 / 16)));
      width: var(--stage-w);
      aspect-ratio: 9 / 16;
      background: #000;
      position: relative;
      overflow: hidden;
      font-family: 'Playfair Display', serif;
      will-change: transform;
      /* ✅ Expose stage width as a custom property so font clamp() can reference it */
      container-type: inline-size;
    }

    /* Fallback for browsers without dvh — overrides with 100vh */
    @supports not (height: 100dvh) {
      #stage { --stage-w: min(420px, min(100vw, calc(100vh * 9 / 16))); }
    }

    canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      image-rendering: crisp-edges;
      display: block; /* removes inline baseline gap */
    }

    /* ── Text layer ── */
    #text-layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      text-align: center; pointer-events: none;
      flex-direction: column; gap: 8px;
    }

    .txt {
      color: #f0ece4;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      /*
       * ✅ FIX 3 — Font sizes were using vw which resolves against the viewport,
       *    not the stage. On a tall phone the stage is narrower than 100vw.
       *    Using cqi (container query inline) resolves against the stage width.
       *    Falls back to vw which still looks reasonable.
       */
      font-size: clamp(14px, 5.5cqi, 20px);
      letter-spacing: 0.06em;
      opacity: 0;
      /* ✅ Use visibility too so hidden elements don't interfere with touch on Android */
      visibility: hidden;
      transition: opacity 0.85s ease, visibility 0s linear 0.85s;
      line-height: 1.55;
      max-width: 82%;
      font-style: italic;
      /* ✅ Prevent iOS font size inflation */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      /* Stack all lines in centre */
      position: absolute;
    }

    .txt.visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.85s ease, visibility 0s linear 0s;
    }

    /* Sub-line: smaller, spaced, upright */
    .txt.sub {
      font-size: clamp(9px, 2.8cqi, 12px);
      letter-spacing: 0.24em;
      color: rgba(240, 236, 228, 0.52);
      font-style: normal;
      font-weight: 300;
    }

    /* ── Trio wrapper (scenes 3) ── */
    #trio-wrap {
      position: absolute;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      /* Hidden by default; JS controls individual line opacity */
      pointer-events: none;
    }
    #trio-wrap .trio-line {
      color: rgba(240, 236, 228, 0.55);
      font-family: 'Playfair Display', serif;
      font-style: normal;
      font-weight: 300;
      font-size: clamp(9px, 2.8cqi, 12px);
      letter-spacing: 0.26em;
      text-align: center;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      opacity: 0;
      visibility: hidden;
      /* Each line fades in independently via JS-set transition-delay */
      transition: opacity 0.5s ease, visibility 0s linear 0.5s;
    }
    #trio-wrap .trio-line.visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s ease, visibility 0s linear 0s;
    }

    /* ── Final line: larger, slower fade ── */
    #t6 {
      font-size: clamp(15px, 6cqi, 24px);
      letter-spacing: 0.04em;
      font-style: italic;
      font-weight: 400;
      color: #f0ece4;
      /* Slower reveal for dramatic close */
      transition: opacity 1.4s ease, visibility 0s linear 0s;
    }
    #t6.visible {
      transition: opacity 1.4s ease, visibility 0s linear 0s;
    }

    /* ── Timer bar ── */
    #timer-bar {
      position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      width: 60%; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    #timer-fill {
      height: 100%;
      background: rgba(255,255,255,0.25);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* ── Play / replay button ── */
    #play-btn {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: rgba(0,0,0,0.6);
      z-index: 10;
      flex-direction: column; gap: 12px;
      /* ✅ Removes 300ms tap delay on mobile without needing JS */
      touch-action: manipulation;
      /* ✅ Larger invisible tap target — easier to hit on small screens */
      -webkit-tap-highlight-color: transparent;
    }
    #play-btn svg { opacity: 0.7; }
    #play-label {
      color: rgba(255,255,255,0.4);
      font-size: 10px; letter-spacing: 0.25em;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }
  </style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>

  <div id="text-layer">
    <div class="txt" id="t1">The world has changed.</div>
    <div class="txt" id="t2">The marketing funnel<br>is no longer linear.</div>
    <div id="trio-wrap">
      <div class="trio-line" id="tA">NEW CHANNELS</div>
      <div class="trio-line" id="tB">SHIFTING CONSUMERS</div>
      <div class="trio-line" id="tC">EVOLVING TRENDS</div>
    </div>
    <div class="txt" id="t4">The landscape has moved —</div>
    <div class="txt sub" id="t5">and it's not waiting for you.</div>
    <div class="txt" id="t6">Are you keeping up?</div>
  </div>

  <div id="timer-bar"><div id="timer-fill"></div></div>

  <div id="play-btn">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="21" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <polygon points="17,14 34,22 17,30" fill="rgba(255,255,255,0.7)"/>
    </svg>
    <div id="play-label">Play</div>
  </div>
</div>

<script>
  /* ── Elements ── */
  const canvas    = document.getElementById('c');
  const ctx       = canvas.getContext('2d');
  const stage     = document.getElementById('stage');
  const timerFill = document.getElementById('timer-fill');
  const playBtn   = document.getElementById('play-btn');
  const trioWrap  = document.getElementById('trio-wrap');
  const trioLines = Array.from(trioWrap.querySelectorAll('.trio-line'));

  const texts = {
    t1: document.getElementById('t1'),
    t2: document.getElementById('t2'),
    t4: document.getElementById('t4'),
    t5: document.getElementById('t5'),
    t6: document.getElementById('t6'),
  };

  /* ── Timing ── */
  const SPEED    = 1.5;
  const DURATION = Math.round(28000 / SPEED);
  const T        = ms => Math.round(ms / SPEED);

  /* ── State ── */
  let W, H, cx, cy;
  let particles = [], funnelPts = [];
  let animId, startTime, playing = false, trioShown = false;

  // ✅ Cap DPR at 2 — DPR 3/4 phones allocate a huge canvas for no visible gain
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  /* ── Resize ── */
  let resizeTimer;
  function resize() {
    const r = stage.getBoundingClientRect();
    W = r.width;
    H = r.height;
    // ✅ setTransform replaces ctx.scale to avoid compounding transforms on repeated resize
    canvas.width  = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2;
    cy = H / 2;
    buildFunnel();
    initParticles();
  }
  // ✅ Debounced ResizeObserver — handles orientation change on mobile cleanly
  new ResizeObserver(() => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resize, 60);
  }).observe(stage);
  resize();

  /* ── Funnel geometry ── */
  function buildFunnel() {
    funnelPts = [];
    const topW = W * 0.38, botW = W * 0.07;
    const topY = cy - H * 0.22, botY = cy + H * 0.22;
    for (let i = 0; i <= 28; i++) {
      const pct = i / 28;
      const hw  = topW / 2 + (botW / 2 - topW / 2) * pct;
      const y   = topY + (botY - topY) * pct;
      funnelPts.push({ pct, hw, y, left: cx - hw, right: cx + hw });
    }
  }

  /* ── Particles ── */
  function initParticles() {
    particles = [];
    for (let i = 0; i < 200; i++) {
      const side  = Math.random() < 0.5 ? -1 : 1;
      const pct   = Math.random();
      const row   = funnelPts[Math.floor(pct * (funnelPts.length - 1))];
      const baseX = side > 0 ? row.right : row.left;
      const baseY = row.y;
      particles.push({
        x: baseX, y: baseY, ox: baseX, oy: baseY,
        alpha:  Math.random() * 0.65 + 0.2,
        size:   Math.random() * 1.3 + 0.3,
        driftX: (Math.random() - 0.5) * 130,
        driftY: (Math.random() - 0.5) * 110,
        phase:  Math.random() * Math.PI * 2,
        side, pct,
      });
    }
  }

  /* ── Math helpers ── */
  function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
  function lerp(a, b, t) { return a + (b-a)*t; }

  /* ── Draw: funnel ── */
  function drawFunnel(glitch, fragPct, alpha) {
    if (alpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = alpha;
    const lc = funnelPts.length - 1;
    for (let i = 0; i < lc; i++) {
      const a = funnelPts[i], b = funnelPts[i+1];
      const segA = 1 - Math.pow(i / lc, 1.5) * fragPct;
      if (segA <= 0) continue;
      const gx = glitch > 0 ? (Math.random()-0.5)*glitch*12 : 0;
      const gy = glitch > 0 ? (Math.random()-0.5)*glitch*4  : 0;
      ctx.beginPath();
      ctx.moveTo(a.left+gx,  a.y+gy); ctx.lineTo(b.left+gx,  b.y+gy);
      ctx.moveTo(a.right+gx, a.y+gy); ctx.lineTo(b.right+gx, b.y+gy);
      const br = 0.55 + 0.3*(1 - i/lc);
      const bv = Math.round(br * 255);
      const grad = ctx.createLinearGradient(0, a.y, 0, b.y);
      grad.addColorStop(0, `rgba(${bv},${bv},${bv},${segA})`);
      grad.addColorStop(1, `rgba(${bv},${bv},${bv},${segA*0.6})`);
      ctx.strokeStyle = grad; ctx.lineWidth = 0.5; ctx.stroke();
    }
    for (let i = 0; i < funnelPts.length; i += 4) {
      const row  = funnelPts[i];
      const segA = (1 - Math.pow(i/funnelPts.length, 1.3)*fragPct) * 0.25;
      if (segA <= 0) continue;
      const gx = glitch > 0 ? (Math.random()-0.5)*glitch*8 : 0;
      ctx.beginPath();
      ctx.moveTo(row.left+gx, row.y); ctx.lineTo(row.right+gx, row.y);
      ctx.strokeStyle = `rgba(200,200,200,${segA})`;
      ctx.lineWidth = 0.4; ctx.stroke();
    }
    ctx.restore();
  }

  /* ── Draw: glow ── */
  function drawGlow(fragPct, elapsed) {
    const gAlpha = Math.max(0, fragPct - 0.25);
    if (gAlpha > 0) {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, H*0.38);
      g.addColorStop(0,   `rgba(160,150,200,${gAlpha*0.09})`);
      g.addColorStop(0.5, `rgba(120,110,180,${gAlpha*0.04})`);
      g.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(cx, cy, H*0.38, 0, Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
    }
    const s19 = T(19000);
    if (elapsed > s19) {
      const progress = Math.min(1, (elapsed - s19) / T(5000));
      const pulse    = Math.sin(elapsed * 0.0012) * 0.5 + 0.5;
      const pAlpha   = easeInOut(progress) * pulse * 0.07;
      const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, W*0.55);
      g2.addColorStop(0, `rgba(200,195,230,${pAlpha})`);
      g2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(cx, cy, W*0.55, 0, Math.PI*2);
      ctx.fillStyle = g2; ctx.fill();
    }
  }

  /* ── Draw: particles ── */
  function drawParticles(fragPct, elapsed) {
    for (const p of particles) {
      const drift = Math.min(1, Math.max(0, (fragPct - 0.08) / 0.72));
      p.x = lerp(p.ox, p.ox + p.driftX*drift, easeInOut(Math.min(1, drift*1.4)));
      p.y = lerp(p.oy, p.oy + p.driftY*drift, easeInOut(Math.min(1, drift*1.4)));
      p.y += Math.sin(elapsed*0.0006 + p.phase) * 2.2 * drift;
      const a     = p.alpha * (0.15 + 0.85*Math.min(1, fragPct*2));
      const glowR = p.size * 3.8;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
      g.addColorStop(0, `rgba(220,218,210,${a})`);
      g.addColorStop(1, 'rgba(220,218,210,0)');
      ctx.beginPath(); ctx.arc(p.x, p.y, glowR, 0, Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.4, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,238,230,${a})`; ctx.fill();
    }
  }

  /* ── Text helpers ── */
  function hideAll() {
    Object.values(texts).forEach(el => el.classList.remove('visible'));
    trioLines.forEach(l => l.classList.remove('visible'));
  }

  function showOnly(id) {
    hideAll();
    if (id && texts[id]) texts[id].classList.add('visible');
  }

  // ✅ FIX 4 — Trio uses class-based visibility (no inline style conflicts).
  //    Each line gets a staggered delay via JS before the class is added,
  //    avoiding the race condition between wrapper opacity and line opacity.
  function showTrio() {
    if (trioShown) return;
    trioShown = true;
    hideAll();
    trioLines.forEach((l, i) => {
      setTimeout(() => l.classList.add('visible'), i * 320);
    });
  }

  /* ── Scanline glitch ── */
  function doScanline(glitch) {
    if (glitch <= 0.1 || Math.random() >= glitch * 0.35) return;
    // ✅ FIX 5 — getImageData works in physical (DPR) pixels.
    //    ctx.setTransform already scales draws, but getImageData is always
    //    in raw canvas pixels. We must pass physical coords here.
    const sy    = Math.random() * H;
    const sh    = Math.random() * 3 + 1;
    const shift = (Math.random() - 0.5) * glitch * 20;
    const px    = Math.round(sy * DPR);
    const ph    = Math.max(1, Math.round(sh * DPR));
    const pw    = Math.round(W * DPR);
    // Guard: don't read past canvas bottom
    if (px + ph > canvas.height) return;
    try {
      ctx.save();
      ctx.globalAlpha = glitch * 0.15;
      // putImageData ignores current transform so we must draw in CSS px
      // by temporarily resetting, drawing, then restoring
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      const imgData = ctx.getImageData(0, px, pw, ph);
      ctx.putImageData(imgData, Math.round(shift * DPR), px);
      ctx.restore();
      // Re-apply DPR transform after the temporary reset
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e) { /* silently ignore rare edge-pixel errors */ }
  }

  /* ── Main animation loop ── */
  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    timerFill.style.width = (Math.min(1, elapsed / DURATION) * 100) + '%';

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

    let glitch = 0, fragPct = 0, funnelAlpha = 1;

    if (elapsed < T(3500)) {
      // Scene 1 — "The world has changed."
      funnelAlpha = Math.min(1, elapsed / T(900));
      fragPct = 0; glitch = 0;
      showOnly('t1');

    } else if (elapsed < T(7500)) {
      // Scene 2 — "The marketing funnel is no longer linear."
      funnelAlpha = 1; fragPct = 0;
      const p2 = (elapsed - T(3500)) / T(4000);
      glitch = Math.sin(p2 * Math.PI) * 0.12;
      showOnly('t2');

    } else if (elapsed < T(11500)) {
      // Scene 3 — Trio: NEW CHANNELS / SHIFTING CONSUMERS / EVOLVING TRENDS
      funnelAlpha = 1;
      const p3 = (elapsed - T(7500)) / T(4000);
      glitch  = easeInOut(p3) * 0.65;
      fragPct = easeInOut(p3) * 0.25;
      showTrio();

    } else if (elapsed < T(15000)) {
      // Scene 4 — "The landscape has moved —"
      const p4 = (elapsed - T(11500)) / T(3500);
      glitch      = 0.65 + p4 * 0.35;
      fragPct     = 0.25 + p4 * 0.6;
      funnelAlpha = 1 - p4 * 0.65;
      showOnly('t4');

    } else if (elapsed < T(19000)) {
      // Scene 5 — "and it's not waiting for you."
      const p5 = (elapsed - T(15000)) / T(4000);
      glitch      = Math.max(0, 0.5 - p5 * 0.8);
      fragPct     = 0.85 + p5 * 0.12;
      funnelAlpha = Math.max(0, 0.35 - p5 * 0.35);
      showOnly('t5');

    } else {
      // Scene 6 — "Are you keeping up?"
      fragPct = 1; funnelAlpha = 0; glitch = 0;
      showOnly('t6');
    }

    drawGlow(fragPct, elapsed);
    drawFunnel(glitch, fragPct, funnelAlpha);
    drawParticles(fragPct, elapsed);
    doScanline(glitch);

    if (elapsed < DURATION) {
      animId = requestAnimationFrame(animate);
    } else {
      showOnly('t6');
      timerFill.style.width = '100%';
      setTimeout(() => { playBtn.style.display = 'flex'; playing = false; }, 800);
    }
  }

  /* ── Start / replay ── */
  function startAnim() {
    if (playing) return;
    playing   = true;
    startTime = null;
    trioShown = false;
    timerFill.style.width = '0%';
    hideAll();
    cancelAnimationFrame(animId);
    initParticles();
    animId = requestAnimationFrame(animate);
  }

  // ✅ Both click (desktop) and touchstart (mobile); preventDefault stops ghost clicks
  ['click', 'touchstart'].forEach(evt =>
    playBtn.addEventListener(evt, e => {
      e.preventDefault();
      playBtn.style.display = 'none';
      startAnim();
    }, { passive: false })
  );
</script>
</body>
</html>
