<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Animation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

#stage{
  width:100vw;
  max-width:420px;
  margin:0 auto;
  aspect-ratio:9/16;
  background:#000;
  position:relative;
  overflow:hidden;
  font-family:'Playfair Display',serif;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

#text-layer{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
  flex-direction:column;
  gap:10px;
}

.txt{
  color:#f0ece4;
  font-family:'Playfair Display',serif;
  font-weight:400;
  font-size:clamp(13px,3vw,20px);
  letter-spacing:0.06em;
  opacity:0;
  transition:opacity 0.9s ease;
  line-height:1.55;
  max-width:80%;
  font-style:italic;
}

.txt.sub{
  font-size:clamp(8px,1.7vw,12px);
  letter-spacing:0.22em;
  color:rgba(240,236,228,0.55);
  font-style:normal;
  font-weight:300;
}

.txt.visible{
  opacity:1;
}

#timer-bar{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:1px;
  background:rgba(255,255,255,0.08);
}

#timer-fill{
  height:100%;
  background:rgba(255,255,255,0.25);
  width:0%;
}

#play-btn{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:rgba(0,0,0,0.6);
  z-index:10;
  flex-direction:column;
  gap:12px;

  /* Mobile fix */
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

#play-btn svg{
  opacity:0.7;
}

#play-label{
  color:rgba(255,255,255,0.4);
  font-size:10px;
  letter-spacing:0.25em;
  font-family:'Playfair Display',serif;
  font-style:italic;
}

@media (max-width:768px){
  .txt{
    font-size:clamp(14px,4vw,20px);
    max-width:85%;
  }

  .txt.sub{
    font-size:clamp(9px,2vw,12px);
  }

  #timer-bar{
    width:70%;
    bottom:14px;
  }
}
</style>
</head>

<body>

<div id="stage">
  <canvas id="c"></canvas>

  <div id="text-layer">
    <div class="txt" id="t1">Marketing used to be linear.</div>
    <div class="txt sub" id="t2">Awareness → Consideration → Conversion</div>
    <div class="txt" id="t3">That world is gone.</div>
    <div class="txt" id="t4">Today…</div>
    <div class="txt" id="t5">Attention doesn't follow a path.</div>
  </div>

  <div id="timer-bar">
    <div id="timer-fill"></div>
  </div>

  <div id="play-btn">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="21" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
      <polygon points="17,14 34,22 17,30" fill="rgba(255,255,255,0.7)"/>
    </svg>
    <div id="play-label">Play</div>
  </div>
</div>

<script>
const playBtn = document.getElementById('play-btn');
const timerFill = document.getElementById('timer-fill');
const texts = {
  t1: document.getElementById('t1'),
  t2: document.getElementById('t2'),
  t3: document.getElementById('t3'),
  t4: document.getElementById('t4'),
  t5: document.getElementById('t5')
};

let playing = false;

function setTextVisibility(id){
  Object.values(texts).forEach(el => el.classList.remove('visible'));
  if(id && texts[id]) texts[id].classList.add('visible');
}

function startAnim(){
  if(playing) return;
  playing = true;

  timerFill.style.width = "0%";
  setTextVisibility("t1");

  let progress = 0;

  const interval = setInterval(() => {
    progress += 1;
    timerFill.style.width = progress + "%";

    if(progress === 20) setTextVisibility("t2");
    if(progress === 40) setTextVisibility("t3");
    if(progress === 60) setTextVisibility("t4");
    if(progress === 80) setTextVisibility("t5");

    if(progress >= 100){
      clearInterval(interval);
      playing = false;
      setTimeout(() => {
        playBtn.style.display = "flex";
      }, 800);
    }
  }, 150);
}

/* Mobile + Desktop Play Fix */
function handlePlay(e){
  e.preventDefault();
  playBtn.style.display = "none";
  startAnim();
}

playBtn.addEventListener("click", handlePlay);
playBtn.addEventListener("touchstart", handlePlay, { passive:false });
</script>

</body>
</html>
