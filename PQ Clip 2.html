
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
#stage{
  width:100%;max-width:420px;margin:0 auto;
  aspect-ratio:9/16;background:#000;
  position:relative;overflow:hidden;
}
canvas{position:absolute;inset:0;width:100%;height:100%}
#text-layer{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;pointer-events:none;gap:6px;
}
.txt{
  color:#f0ece4;
  font-family:'Playfair Display',serif;
  font-weight:400;font-style:italic;
  font-size:clamp(13px,3vw,20px);
  letter-spacing:0.05em;
  opacity:0;transition:opacity 1s ease;
  line-height:1.55;max-width:78%;
}
.txt.sub{
  font-style:normal;font-weight:300;
  font-size:clamp(9px,1.8vw,13px);
  letter-spacing:0.1em;
  color:rgba(240,236,228,0.65);
  margin-top:4px;
}
.txt.visible{opacity:1}
#timer-bar{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  width:60%;height:1px;background:rgba(255,255,255,0.07);
}
#timer-fill{height:100%;background:rgba(255,255,255,0.22);width:0%}
#play-btn{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;background:rgba(0,0,0,0.65);z-index:10;
  flex-direction:column;gap:12px;
}
#play-label{
  color:rgba(255,255,255,0.38);font-size:10px;
  letter-spacing:0.28em;font-family:'Playfair Display',serif;font-style:italic;
}
</style>

<div id="stage">
  <canvas id="c"></canvas>
  <div id="text-layer">
    <div class="txt" id="t1">People don't follow funnels.</div>
    <div class="txt" id="t2">They step into moments.</div>
    <div class="txt" id="t3">They remember experiences.</div>
    <div class="txt" id="t4">They share what they feel.</div>
    <div class="txt" id="t5">Brands are no longer seen.</div>
    <div class="txt sub" id="t6">They are experienced.</div>
  </div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div id="play-btn">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="21" stroke="rgba(255,255,255,0.28)" stroke-width="0.5"/>
      <polygon points="17,14 34,22 17,30" fill="rgba(255,255,255,0.72)"/>
    </svg>
    <div id="play-label">Play</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const els = {
  t1: document.getElementById('t1'),
  t2: document.getElementById('t2'),
  t3: document.getElementById('t3'),
  t4: document.getElementById('t4'),
  t5: document.getElementById('t5'),
  t6: document.getElementById('t6'),
};
const timerFill = document.getElementById('timer-fill');
const playBtn = document.getElementById('play-btn');

const DURATION = 16000;
let W, H, cx, cy;
let particles = [], layers = [], ripples = [];
let startTime = null, animId = null, playing = false;

function resize() {
  const r = stage.getBoundingClientRect();
  W = canvas.width = r.width * devicePixelRatio;
  H = canvas.height = r.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W /= devicePixelRatio; H /= devicePixelRatio;
  cx = W / 2; cy = H / 2;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function eio(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; }
function clamp(v,a,b) { return Math.max(a, Math.min(b, v)); }

// ── Particles ────────────────────────────────────────────────
function mkParticle(depthBias) {
  const depth = depthBias !== undefined ? depthBias : Math.random();
  // scatter loosely at start
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    ox: 0, oy: 0,          // origin filled below
    tx: 0, ty: 0,          // target (spatial layer pos)
    depth,                 // 0=far,dim  1=near,bright
    size: 0.3 + depth * 1.6,
    alpha: 0.1 + depth * 0.55,
    phase: Math.random() * Math.PI * 2,
    speed: 0.18 + Math.random() * 0.22,
    drift: { x: (Math.random()-0.5)*0.3, y: (Math.random()-0.5)*0.18 },
    gathered: false,
  };
}

function initParticles() {
  particles = [];
  // background far layer — many, dim
  for (let i = 0; i < 90; i++) particles.push(mkParticle(Math.random() * 0.35));
  // mid layer
  for (let i = 0; i < 55; i++) particles.push(mkParticle(0.35 + Math.random() * 0.35));
  // near bright
  for (let i = 0; i < 25; i++) particles.push(mkParticle(0.7 + Math.random() * 0.3));

  // assign spatial targets — create a layered "room" feel
  // back wall: cluster around center high
  // side walls: scatter toward edges at mid-height
  // floor suggestion: bottom arc
  particles.forEach((p, i) => {
    if (p.depth < 0.35) {
      // far — star-field spread
      p.tx = cx + (Math.random()-0.5) * W * 0.9;
      p.ty = cy + (Math.random()-0.5) * H * 0.85;
    } else if (p.depth < 0.7) {
      // mid — suggest peripheral walls: bias toward edges
      const side = Math.random() < 0.5 ? -1 : 1;
      p.tx = cx + side * (W * 0.2 + Math.random() * W * 0.28);
      p.ty = H * 0.15 + Math.random() * H * 0.7;
    } else {
      // near — subtle foreground halo
      const angle = Math.random() * Math.PI * 2;
      const r = W * 0.05 + Math.random() * W * 0.3;
      p.tx = cx + Math.cos(angle) * r;
      p.ty = cy + Math.sin(angle) * r * 0.55;
    }
    p.ox = p.x; p.oy = p.y;
  });

  ripples = [];
}

// ── Depth layers (soft gradient rings) ───────────────────────
function initLayers() {
  layers = [
    { cx: cx,       cy: cy,       r: H * 0.38, col: [100, 90, 160],  maxA: 0.07 },
    { cx: cx,       cy: cy*1.55,  r: H * 0.55, col: [60,  50, 120],  maxA: 0.05 },
    { cx: cx*0.35,  cy: cy*0.75,  r: H * 0.32, col: [80, 100, 150],  maxA: 0.04 },
    { cx: cx*1.65,  cy: cy*0.75,  r: H * 0.32, col: [80, 100, 150],  maxA: 0.04 },
  ];
}

function spawnRipple() {
  ripples.push({ t: 0, maxR: W * 0.52, alpha: 0.18, speed: 0.008 });
}

// ── Render helpers ────────────────────────────────────────────
function drawBg(depthPct) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // central ambient glow — grows with depth formation
  if (depthPct > 0) {
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.5);
    g.addColorStop(0, `rgba(90,75,160,${depthPct * 0.11})`);
    g.addColorStop(0.5, `rgba(50,40,110,${depthPct * 0.055})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx, cy, H * 0.5, 0, Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
  }
}

function drawLayers(depthPct, elapsed) {
  if (depthPct <= 0) return;
  layers.forEach((l, i) => {
    const pulse = Math.sin(elapsed * 0.0007 + i * 1.3) * 0.4 + 0.6;
    const a = l.maxA * depthPct * pulse;
    const gr = ctx.createRadialGradient(l.cx, l.cy, 0, l.cx, l.cy, l.r);
    gr.addColorStop(0, `rgba(${l.col.join(',')},${a})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(l.cx, l.cy, l.r, 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
  });
}

function drawRipples() {
  ripples = ripples.filter(r => r.alpha > 0.005);
  ripples.forEach(r => {
    r.t += r.speed;
    r.alpha *= 0.965;
    const rad = r.maxR * eio(Math.min(r.t, 1));
    ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(180,170,220,${r.alpha})`;
    ctx.lineWidth = 0.6; ctx.stroke();
    // inner softer ring
    if (rad > 20) {
      ctx.beginPath(); ctx.arc(cx, cy, rad * 0.6, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(160,150,210,${r.alpha * 0.5})`;
      ctx.lineWidth = 0.4; ctx.stroke();
    }
  });
}

function drawParticles(gatherPct, fwdPct, elapsed) {
  particles.forEach(p => {
    // gather toward target
    const gp = eio(clamp(gatherPct, 0, 1));
    const px = lerp(p.ox, p.tx, gp);
    const py = lerp(p.oy, p.ty, gp);

    // gentle drift
    const drift = Math.sin(elapsed * p.speed * 0.001 + p.phase);
    const dx = p.drift.x * 22 * drift;
    const dy = p.drift.y * 18 * drift;

    // forward zoom parallax: near particles move outward from center more
    const fwd = fwdPct * p.depth * 0.18;
    const fromCx = px - cx, fromCy = py - cy;
    const fx = px + fromCx * fwd + dx;
    const fy = py + fromCy * fwd + dy;

    // scale-up near particles with forward motion
    const sScale = 1 + fwdPct * p.depth * 0.45;
    const r = p.size * sScale;
    const a = clamp(p.alpha * (0.55 + 0.45 * gp), 0, 1);

    // glow halo
    const glowR = r * (3.5 + p.depth * 2.5);
    const gr = ctx.createRadialGradient(fx, fy, 0, fx, fy, glowR);
    gr.addColorStop(0, `rgba(215,210,230,${a * 0.65})`);
    gr.addColorStop(1, 'rgba(215,210,230,0)');
    ctx.beginPath(); ctx.arc(fx, fy, glowR, 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();

    // core dot
    ctx.beginPath(); ctx.arc(fx, fy, r * 0.38, 0, Math.PI*2);
    ctx.fillStyle = `rgba(240,238,232,${a})`;
    ctx.fill();
  });
}

function setVisible(ids) {
  Object.values(els).forEach(e => e.classList.remove('visible'));
  if (!ids) return;
  (Array.isArray(ids) ? ids : [ids]).forEach(id => {
    if (els[id]) els[id].classList.add('visible');
  });
}

// ── Main loop ─────────────────────────────────────────────────
let lastRipple = 0;

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const phase = clamp(elapsed / DURATION, 0, 1);
  timerFill.style.width = (phase * 100) + '%';

  // Gather pct: starts at 0, fully gathered by ~8s
  const gatherPct = clamp((elapsed - 1000) / 6000, 0, 1);
  // Depth layers fade in from 3s
  const depthPct = clamp((elapsed - 3000) / 5000, 0, 1);
  // Forward drift: slow push from 5s to 14s
  const fwdPct = clamp((elapsed - 5000) / 9000, 0, 1) * eio(clamp((elapsed - 5000) / 9000, 0, 1));

  // ripples: spawn at 9s and 11s windows
  if (elapsed > 9000 && elapsed < 12000) {
    if (elapsed - lastRipple > 1400) { spawnRipple(); lastRipple = elapsed; }
  }

  ctx.clearRect(0, 0, W, H);
  drawBg(depthPct);
  drawLayers(depthPct, elapsed);
  drawRipples();
  drawParticles(gatherPct, fwdPct, elapsed);

  // Text timing
  if (elapsed < 2800)            setVisible('t1');
  else if (elapsed < 5800)       setVisible('t2');
  else if (elapsed < 8800)       setVisible('t3');
  else if (elapsed < 12000)      setVisible('t4');
  else if (elapsed < 13000)      setVisible(null);
  else                           setVisible(['t5','t6']);

  if (elapsed < DURATION) {
    animId = requestAnimationFrame(animate);
  } else {
    setVisible(['t5','t6']);
    timerFill.style.width = '100%';
    setTimeout(() => { playBtn.style.display = 'flex'; playing = false; }, 700);
  }
}

function startAnim() {
  if (playing) return;
  playing = true;
  startTime = null;
  lastRipple = 0;
  timerFill.style.width = '0%';
  Object.values(els).forEach(e => e.classList.remove('visible'));
  cancelAnimationFrame(animId);
  initParticles();
  initLayers();
  animId = requestAnimationFrame(animate);
}

playBtn.addEventListener('click', () => { playBtn.style.display = 'none'; startAnim(); });
new ResizeObserver(resize).observe(stage);
resize();
</script>
