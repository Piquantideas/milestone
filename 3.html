
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
#stage{
  width:100%;max-width:420px;margin:0 auto;
  aspect-ratio:9/16;background:#000;
  position:relative;overflow:hidden;
}
canvas{position:absolute;inset:0;width:100%;height:100%}
#text-layer{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;pointer-events:none;gap:7px;
}
.txt{
  color:#f0ece4;
  font-family:'Playfair Display',serif;
  font-weight:400;font-style:italic;
  font-size:clamp(13px,3vw,20px);
  letter-spacing:0.05em;
  opacity:0;transition:opacity 1s ease;
  line-height:1.55;max-width:78%;
}
.txt.sub{
  font-style:normal;font-weight:300;
  font-size:clamp(9px,1.9vw,13px);
  letter-spacing:0.12em;
  color:rgba(240,236,228,0.62);
  margin-top:3px;
}
.txt.visible{opacity:1}
#timer-bar{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  width:60%;height:1px;background:rgba(255,255,255,0.07);
}
#timer-fill{height:100%;background:rgba(255,255,255,0.22);width:0%}
#play-btn{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;background:rgba(0,0,0,0.65);z-index:10;
  flex-direction:column;gap:12px;
}
#play-label{
  color:rgba(255,255,255,0.38);font-size:10px;
  letter-spacing:0.28em;font-family:'Playfair Display',serif;font-style:italic;
}
</style>

<div id="stage">
  <canvas id="c"></canvas>
  <div id="text-layer">
    <div class="txt" id="t1">Growth doesn't happen in isolation.</div>
    <div class="txt" id="t2">It happens in ecosystems.</div>
    <div class="txt" id="t3">Partnerships expand reach.</div>
    <div class="txt" id="t4">Multiply relevance.</div>
    <div class="txt" id="t5">Unlock new audiences.</div>
    <div class="txt" id="t6">Great brands don't build alone.</div>
    <div class="txt sub" id="t7">They orchestrate.</div>
  </div>
  <div id="timer-bar"><div id="timer-fill"></div></div>
  <div id="play-btn">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="21" stroke="rgba(255,255,255,0.28)" stroke-width="0.5"/>
      <polygon points="17,14 34,22 17,30" fill="rgba(255,255,255,0.72)"/>
    </svg>
    <div id="play-label">Play</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');
const els = { t1:'t1',t2:'t2',t3:'t3',t4:'t4',t5:'t5',t6:'t6',t7:'t7' };
const textEls = {};
Object.values(els).forEach(id => textEls[id] = document.getElementById(id));
const timerFill = document.getElementById('timer-fill');
const playBtn = document.getElementById('play-btn');

const DURATION = 16000;
let W, H, cx, cy;
let dustParticles = [], nodes = [], edges = [], pulses = [];
let startTime = null, animId = null, playing = false;

function resize() {
  const r = stage.getBoundingClientRect();
  W = canvas.width = r.width * devicePixelRatio;
  H = canvas.height = r.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W /= devicePixelRatio; H /= devicePixelRatio;
  cx = W / 2; cy = H / 2;
}

function lerp(a,b,t){ return a+(b-a)*t; }
function eio(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

// ── Ambient dust (continuation from clip 2) ───────────────────
function initDust() {
  dustParticles = [];
  for (let i = 0; i < 140; i++) {
    const depth = Math.random();
    dustParticles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      depth,
      size: 0.25 + depth * 1.1,
      alpha: 0.08 + depth * 0.35,
      phase: Math.random() * Math.PI * 2,
      speed: 0.15 + Math.random() * 0.2,
      drift: { x: (Math.random()-0.5)*0.25, y: (Math.random()-0.5)*0.18 }
    });
  }
}

// ── Network nodes ─────────────────────────────────────────────
function mkNodes() {
  nodes = [];
  // Central anchor
  nodes.push({ x: cx, y: cy, tier: 0, r: 2.8, born: 3000 });
  // Inner ring — 5 nodes
  const innerR = Math.min(W,H) * 0.19;
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2 - Math.PI/2;
    nodes.push({
      x: cx + Math.cos(a)*innerR,
      y: cy + Math.sin(a)*innerR*0.72,
      tier: 1, r: 2.0,
      born: 3200 + i * 320
    });
  }
  // Mid ring — 8 nodes
  const midR = Math.min(W,H) * 0.34;
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2 + 0.18;
    nodes.push({
      x: cx + Math.cos(a)*midR,
      y: cy + Math.sin(a)*midR*0.68,
      tier: 2, r: 1.5,
      born: 5800 + i * 280
    });
  }
  // Outer ring — 12 nodes
  const outerR = Math.min(W,H) * 0.46;
  for (let i = 0; i < 12; i++) {
    const a = (i/12)*Math.PI*2 + 0.05;
    nodes.push({
      x: cx + Math.cos(a)*outerR,
      y: cy + Math.sin(a)*outerR*0.64,
      tier: 3, r: 1.1,
      born: 9000 + i * 220
    });
  }
}

// ── Edges ─────────────────────────────────────────────────────
function mkEdges() {
  edges = [];
  const tier0 = nodes.filter(n=>n.tier===0);
  const tier1 = nodes.filter(n=>n.tier===1);
  const tier2 = nodes.filter(n=>n.tier===2);
  const tier3 = nodes.filter(n=>n.tier===3);

  // center → inner
  tier1.forEach((n,i) => {
    edges.push({ a: tier0[0], b: n, born: 5800 + i*260, tier: 1 });
  });
  // inner → mid (nearest)
  tier1.forEach((n1,i) => {
    let best = tier2.slice().sort((a,b)=>dist(n1,a)-dist(n1,b)).slice(0,2);
    best.forEach((n2,j) => {
      edges.push({ a:n1, b:n2, born: 7200 + i*210 + j*90, tier: 2 });
    });
  });
  // mid → outer (nearest)
  tier2.forEach((n2,i) => {
    let best = tier3.slice().sort((a,b)=>dist(n2,a)-dist(n2,b)).slice(0,2);
    best.forEach((n3,j) => {
      edges.push({ a:n2, b:n3, born: 9800 + i*180 + j*70, tier: 3 });
    });
  });
  // inner lateral connections
  for (let i=0;i<tier1.length;i++) {
    const j=(i+1)%tier1.length;
    edges.push({ a:tier1[i], b:tier1[j], born: 6400+i*200, tier:1 });
  }
  // mid laterals (alternating)
  for (let i=0;i<tier2.length;i+=2) {
    const j=(i+1)%tier2.length;
    edges.push({ a:tier2[i], b:tier2[j], born: 8200+i*160, tier:2 });
  }
}

function spawnPulse(x, y, maxR, col) {
  pulses.push({ x, y, r: 0, maxR, alpha: 0.35, col: col||[200,190,240], speed: maxR*0.012 });
}

// ── Draw helpers ──────────────────────────────────────────────
function drawAmbientGlow(elapsed) {
  // inherited from clip2 — soft central haze
  const pulse = Math.sin(elapsed*0.0006)*0.4+0.6;
  const g = ctx.createRadialGradient(cx,cy,0,cx,cy,H*0.45);
  g.addColorStop(0, `rgba(85,70,155,${0.09*pulse})`);
  g.addColorStop(0.55, `rgba(50,40,110,${0.04*pulse})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,H*0.45,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();

  // flanking atmosphere
  [[cx*0.28,cy*0.72],[cx*1.72,cy*0.72]].forEach(([lx,ly])=>{
    const g2=ctx.createRadialGradient(lx,ly,0,lx,ly,H*0.28);
    g2.addColorStop(0,`rgba(70,80,140,${0.055*pulse})`);
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(lx,ly,H*0.28,0,Math.PI*2);
    ctx.fillStyle=g2; ctx.fill();
  });
}

function drawDust(elapsed) {
  dustParticles.forEach(p => {
    const drift = Math.sin(elapsed*p.speed*0.001+p.phase);
    const fx = p.x + p.drift.x*18*drift;
    const fy = p.y + p.drift.y*14*drift;
    const glowR = p.size*4;
    const g = ctx.createRadialGradient(fx,fy,0,fx,fy,glowR);
    g.addColorStop(0,`rgba(215,210,230,${p.alpha*0.6})`);
    g.addColorStop(1,'rgba(215,210,230,0)');
    ctx.beginPath(); ctx.arc(fx,fy,glowR,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.arc(fx,fy,p.size*0.35,0,Math.PI*2);
    ctx.fillStyle=`rgba(240,238,232,${p.alpha})`; ctx.fill();
  });
}

function drawEdges(elapsed, expandPct) {
  edges.forEach(e => {
    if (elapsed < e.born) return;
    const age = clamp((elapsed - e.born)/900, 0, 1);
    const alpha = eio(age) * (e.tier===1?0.45:e.tier===2?0.32:0.22);
    if (alpha <= 0) return;

    // draw line growing from node a toward b
    const prog = eio(clamp((elapsed-e.born)/700,0,1));
    const ex = lerp(e.a.x, e.b.x, prog);
    const ey = lerp(e.a.y, e.b.y, prog);

    // glow stroke
    ctx.beginPath(); ctx.moveTo(e.a.x, e.a.y); ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(200,192,240,${alpha*0.5})`;
    ctx.lineWidth = 1.8; ctx.stroke();
    // core stroke
    ctx.beginPath(); ctx.moveTo(e.a.x, e.a.y); ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(230,226,248,${alpha})`;
    ctx.lineWidth = 0.45; ctx.stroke();

    // pulse a ripple when edge first fully appears
    if (!e._pulsed && prog >= 0.99) {
      e._pulsed = true;
      spawnPulse(e.b.x, e.b.y, W*0.08, [200,190,240]);
    }
  });
}

function drawNodes(elapsed, expandPct) {
  nodes.forEach(n => {
    if (elapsed < n.born) return;
    const age = clamp((elapsed - n.born)/600, 0, 1);
    const baseA = eio(age);
    const pulse = Math.sin(elapsed*0.0014 + n.x*0.012)*0.3+0.7;
    const scale = 1 + expandPct * 0.18 * (1-n.tier*0.2);
    const r = n.r * scale;

    // outer halo
    const haloR = r*(n.tier===0?10:7)+expandPct*r*3;
    const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,haloR);
    const brightness = n.tier===0?0.28:n.tier===1?0.22:n.tier===2?0.16:0.11;
    g.addColorStop(0,`rgba(210,200,255,${baseA*brightness*pulse})`);
    g.addColorStop(1,'rgba(210,200,255,0)');
    ctx.beginPath(); ctx.arc(n.x,n.y,haloR,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();

    // core
    ctx.beginPath(); ctx.arc(n.x,n.y,r*0.55,0,Math.PI*2);
    ctx.fillStyle=`rgba(245,242,255,${baseA*0.95*pulse})`; ctx.fill();

    // spawn entry pulse
    if (!n._pulsed && age >= 0.95) {
      n._pulsed = true;
      spawnPulse(n.x, n.y, W*(n.tier===0?0.14:0.09), [210,200,255]);
    }
  });
}

function drawPulses() {
  pulses = pulses.filter(p => p.alpha > 0.008);
  pulses.forEach(p => {
    p.r += p.speed;
    p.alpha *= 0.955;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${p.col.join(',')},${p.alpha})`;
    ctx.lineWidth=0.5; ctx.stroke();
  });
}

// ── "Multiply" expand effect ──────────────────────────────────
function drawMultiplyBurst(pct) {
  if (pct <= 0) return;
  for (let i=1;i<=3;i++) {
    const r = Math.min(W,H)*0.22*i*pct;
    const a = (1-pct)*0.12*(1-i*0.25);
    if(a<=0)continue;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(190,182,240,${a})`;
    ctx.lineWidth=0.6; ctx.stroke();
  }
}

function setVisible(ids) {
  Object.values(textEls).forEach(e => e.classList.remove('visible'));
  if (!ids) return;
  (Array.isArray(ids)?ids:[ids]).forEach(id => { if(textEls[id]) textEls[id].classList.add('visible'); });
}

// ── Main loop ─────────────────────────────────────────────────
function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const phase = clamp(elapsed/DURATION, 0, 1);
  timerFill.style.width = (phase*100)+'%';

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // expand pct (multiply moment 9–10s)
  const expandPct = eio(clamp((elapsed-9000)/800,0,1)) * (1-eio(clamp((elapsed-10500)/1200,0,1)));
  // network fully alive pct
  const alivePct = clamp((elapsed-11000)/3000,0,1);

  drawAmbientGlow(elapsed);
  drawDust(elapsed);
  drawMultiplyBurst(expandPct);
  drawEdges(elapsed, expandPct);
  drawNodes(elapsed, expandPct);
  drawPulses();

  // final network breathing glow
  if (alivePct > 0) {
    const breath = Math.sin(elapsed*0.0009)*0.5+0.5;
    const gf = ctx.createRadialGradient(cx,cy,0,cx,cy,H*0.5);
    gf.addColorStop(0,`rgba(100,85,180,${alivePct*0.07*breath})`);
    gf.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(cx,cy,H*0.5,0,Math.PI*2);
    ctx.fillStyle=gf; ctx.fill();
  }

  // Text timing
  if      (elapsed < 2800)  setVisible('t1');
  else if (elapsed < 5600)  setVisible('t2');
  else if (elapsed < 8800)  setVisible('t3');
  else if (elapsed < 10800) setVisible('t4');
  else if (elapsed < 13000) setVisible('t5');
  else if (elapsed < 14000) setVisible(null);
  else                      setVisible(['t6','t7']);

  if (elapsed < DURATION) {
    animId = requestAnimationFrame(animate);
  } else {
    setVisible(['t6','t7']);
    timerFill.style.width='100%';
    setTimeout(()=>{ playBtn.style.display='flex'; playing=false; }, 700);
  }
}

function startAnim() {
  if (playing) return;
  playing = true;
  startTime = null;
  timerFill.style.width='0%';
  Object.values(textEls).forEach(e=>e.classList.remove('visible'));
  cancelAnimationFrame(animId);
  initDust();
  mkNodes();
  mkEdges();
  animId = requestAnimationFrame(animate);
}

playBtn.addEventListener('click', ()=>{ playBtn.style.display='none'; startAnim(); });
new ResizeObserver(resize).observe(stage);
resize();
</script>
